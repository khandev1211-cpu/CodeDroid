<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:* https: wss:;" />
  <title>CodeDroid IDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e1e1e; }
    #root { height: 100%; }
    /* Loading splash */
    #splash {
      position: fixed; inset: 0; background: #1e1e1e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.3s;
    }
    #splash .logo { font-size: 40px; margin-bottom: 12px; }
    #splash h1 { color: #cccccc; font-size: 20px; font-weight: 300; font-family: sans-serif; margin: 0; }
    #splash p { color: #555; font-size: 13px; font-family: sans-serif; margin-top: 6px; }
    #splash .bar {
      width: 160px; height: 2px; background: #333; border-radius: 2px; margin-top: 20px; overflow: hidden;
    }
    #splash .bar-inner {
      width: 40%; height: 100%; background: #0078d4; border-radius: 2px;
      animation: loading 1.2s ease-in-out infinite alternate;
    }
    @keyframes loading { from { transform: translateX(-100%); } to { transform: translateX(300%); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">⚡</div>
    <h1>CodeDroid IDE</h1>
    <p>TypeScript · Python · Rust</p>
    <div class="bar"><div class="bar-inner"></div></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    (function () {
      var splashRemoved = false

      function removeSplash() {
        if (splashRemoved) return
        splashRemoved = true
        var splash = document.getElementById('splash')
        if (splash) {
          splash.style.opacity = '0'
          setTimeout(function () { splash.remove() }, 300)
        }
      }

      // Primary path: React dispatches this once it has actually mounted
      // and committed its first paint (see App.tsx's startup effect).
      window.addEventListener('codedroid-app-ready', function () {
        // Small delay so the splash's own fade-in/branding is visible briefly
        // rather than flashing instantly on fast machines.
        setTimeout(removeSplash, 400)
      })

      // Safety fallback: if for any reason the app-ready event never fires
      // (e.g. a startup crash, slow preload, or hung sidecar handshake),
      // never leave the user staring at a black screen indefinitely.
      // The splash itself gets removed so at least the error/blank #root
      // is visible and DevTools/console can be inspected.
      setTimeout(function () {
        if (!splashRemoved) {
          console.warn('[CodeDroid] App did not signal ready within 8s — removing splash anyway to avoid a stuck black screen.')
          removeSplash()
        }
      }, 8000)
    })()
  </script>
</body>
</html>

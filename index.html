<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;" />
  <title>CodeDroid IDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e1e1e; }
    #root { height: 100%; }
    /* Loading splash */
    #splash {
      position: fixed; inset: 0; background: #1e1e1e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.3s;
    }
    #splash .logo { font-size: 40px; margin-bottom: 12px; }
    #splash h1 { color: #cccccc; font-size: 20px; font-weight: 300; font-family: sans-serif; margin: 0; }
    #splash p { color: #555; font-size: 13px; font-family: sans-serif; margin-top: 6px; }
    #splash .bar {
      width: 160px; height: 2px; background: #333; border-radius: 2px; margin-top: 20px; overflow: hidden;
    }
    #splash .bar-inner {
      width: 40%; height: 100%; background: #0078d4; border-radius: 2px;
      animation: loading 1.2s ease-in-out infinite alternate;
    }
    @keyframes loading { from { transform: translateX(-100%); } to { transform: translateX(300%); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">⚡</div>
    <h1>CodeDroid IDE</h1>
    <p>TypeScript · Python · Rust</p>
    <div class="bar"><div class="bar-inner"></div></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash')
        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 300) }
      }, 800)
    })
  </script>
</body>
</html>

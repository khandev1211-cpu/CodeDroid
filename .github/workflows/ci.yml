name: CI / CD

on:
  push:
    branches: [main, develop]
    tags:     ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared env ──────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ── 1. TypeScript typecheck ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  # ── 2. Rust tests ───────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/core
      - name: Cargo test
        run: cargo test --workspace
        working-directory: crates/core
      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: crates/core
        continue-on-error: true

  # ── 3. Python tests ─────────────────────────────────────────────────────────
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: pip install -r python/requirements.txt pytest pytest-asyncio httpx
      - name: Run tests
        run: python -m pytest python/tests/ -v --tb=short
        continue-on-error: true   # remove once tests are written
      - name: Smoke test sidecar imports
        run: |
          cd python
          python -c "
          import sys, importlib
          mods = ['memory', 'tools', 'context_manager', 'mcp_bus']
          ok = True
          for m in mods:
              try:
                  importlib.import_module(m)
                  print(f'  OK  {m}')
              except Exception as e:
                  print(f'  FAIL {m}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          "

  # ── 4. Vite build (all platforms) ───────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: [typecheck, rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Vite build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          retention-days: 7

  # ── 5. Release (on version tags only) ───────────────────────────────────────
  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, python]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: CodeDroid-Setup*.exe
          - os: macos-latest
            platform: mac
            artifact: CodeDroid*.dmg
          - os: ubuntu-latest
            platform: linux
            artifact: CodeDroid*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # macOS: import signing cert from secrets
      - name: Import macOS cert
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Node deps
        run: npm ci --legacy-peer-deps

      - name: Rebuild native modules
        run: npm run rebuild
        continue-on-error: true

      - name: Build renderer
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID:             ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK:         ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/${{ matrix.artifact }}
            release/latest*.yml
          retention-days: 90